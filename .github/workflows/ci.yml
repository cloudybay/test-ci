name: CI

on:
  push:
    tags:
      - '**'

jobs:
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: docker build -t ghcr.io/cloudybay/test-ci:${{ github.ref_name }} .

      - name: Push Docker image to GHCR
        run: docker push ghcr.io/cloudybay/test-ci:${{ github.ref_name }}

  deploy-production:
    name: Deploy to Production
    needs: build
    if: startsWith(github.ref_name, 'v')
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Trigger deploy_production in test-ci-deploy
        run: |
          node --input-type=module << 'EOF'
          const response = await fetch(
            `https://api.github.com/repos/${process.env.OWNER}/test-ci-deploy/actions/workflows/deploy_production.yml/dispatches`,
            {
              method: 'POST',
              headers: {
                Authorization: `token ${process.env.GH_TOKEN}`,
                Accept: 'application/vnd.github.v3+json',
                'Content-Type': 'application/json',
              },
              body: JSON.stringify({ ref: 'main', inputs: { VAR_OPERATION_MODE: 'prod' } }),
            }
          );
          if (!response.ok) {
            const text = await response.text();
            throw new Error(`HTTP ${response.status}: ${text}`);
          }
          EOF
        env:
          GH_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
          OWNER: ${{ github.repository_owner }}

  deploy-staging:
    name: Deploy to Staging
    needs: build
    if: startsWith(github.ref_name, 'staging-')
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Trigger deploy_staging in test-ci-deploy
        run: |
          node --input-type=module << 'EOF'
          const response = await fetch(
            `https://api.github.com/repos/${process.env.OWNER}/test-ci-deploy/actions/workflows/deploy_staging.yml/dispatches`,
            {
              method: 'POST',
              headers: {
                Authorization: `token ${process.env.GH_TOKEN}`,
                Accept: 'application/vnd.github.v3+json',
                'Content-Type': 'application/json',
              },
              body: JSON.stringify({ ref: 'main', inputs: { VAR_OPERATION_MODE: 'staging' } }),
            }
          );
          if (!response.ok) {
            const text = await response.text();
            throw new Error(`HTTP ${response.status}: ${text}`);
          }
          EOF
        env:
          GH_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
          OWNER: ${{ github.repository_owner }}
